name: knust_shuttle_connect
description: >-
  Live shuttle demand app for KNUST — students check in at bus stops,
  drivers see real-time waiting counts and route shuttles where demand is highest.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  geolocator: ^13.0.1
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  # Phase 2 map views. Map tiles cost mobile data, so the maps are opt-in
  # screens — the default student/driver flows stay on the data-light lists.
  google_maps_flutter: ^2.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
